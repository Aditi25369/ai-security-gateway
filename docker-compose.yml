version: '3.8'

services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - BACKEND_URL=http://ollama:11434
      - BLOCK_THRESHOLD=0.85
      - LOG_ALL=true
    volumes:
      - ./security_audit.db:/app/security_audit.db
      - ./logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://gateway:8080
    depends_on:
      - gateway
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull a small model on first start
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5
        ollama pull llama3.2:latest || true
        wait
      "

volumes:
  ollama_data:
